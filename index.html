<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Knowledge Base Blog</title>
    <meta name="description" content="Static knowledge base blog generated from Markdown.">
    <link rel="icon" href="/blogtest/assets/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/blogtest/assets/site.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.22/dist/katex.min.css">
  </head>
  <body>
    
  <div class="shell">
    <section class="hero">
      <div class="hero-grid">
        <div>
          <p class="eyebrow">Knowledge Base Blog</p>
          <h1>从 Markdown 文件夹生成的博客与知识库.</h1>
          <p class="muted">前台是静态站点, 后台负责文件读写、发布调度和 Monaco 编辑体验.</p>
        </div>
        <div class="card">
          <h3>站点统计</h3>
          <div class="summary-grid">
            <div>
              <p class="eyebrow">Published</p>
              <h2>0</h2>
            </div>
            <div>
              <p class="eyebrow">Tags</p>
              <h2>0</h2>
            </div>
            <div>
              <p class="eyebrow">Folders</p>
              <h2>0</h2>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section class="summary-grid">
      <div class="card">
          <p class="eyebrow">Recent Articles</p>
          <div class="card-list">
          
          </div>
        </div>
      <div class="card">
        <p class="eyebrow">Tags</p>
        <div class="tag-row">
          
        </div>
      </div>
      <div class="card">
        <p class="eyebrow">Directory Tree</p>
        <ul class="tree-list"></ul>
      </div>
    </section>

    <footer class="footer">
      <span>Static build generated from the content folder.</span>
      <a href="/blogtest/tree/">Browse all directories</a>
    </footer>
  </div>
  </body>
</html>
